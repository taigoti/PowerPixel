<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PowerPixel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>PowerPixel</h1>
    <div class="navigation">
        <input type="search" name="find" id="find" placeholder="Busque na PowerPixel!">

        <nav>
            <a href="pages/produtos.html">Produtos</a>
            <a href="pages/carrinho.html">Carrinho</a>
            <a href="pages/perfil.html">Perfil</a>
        </nav>
    </div>

    <div class="nav-login">
        <img src="images/user.png" alt="">
        <a href="pages/login.html">Login</a>
    </div>
</header>

<section class="banner">
    <h2>Bem-vindo à PowerPixel</h2>
    <p>Os melhores periféricos e jogos você encontra aqui!</p>
</section>

<section class="produtos">
    <h2>Destaques</h2>

    <div class="grid" id="grid">

        <div class="card">
            <img src="images/teclado.jpg.jpg">
            <h3>Teclado Gamer</h3>
            <p>R$ 199,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="images/mouse.jpg.jpg">
            <h3>Mouse RGB</h3>
            <p>R$ 99,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="images/giftcard.jpg.webp">
            <h3>Gift Card</h3>
            <p>R$ 50,00</p>
            <button>Comprar</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 PowerPixel</p>
</footer>

<script>
    const products = document.getElementById("grid");
    const card = {
        TAG: "div",
        CLASS: "card",
        CONTENT: "<img src='images/teclado.jpg.jpg'> <h3>Teclado Gamer</h3> <p>R$ 199,90</p> <button>Comprar</button>"
    }

    for (let i = 0; i <= 20; i++) {
        const newCard = document.createElement(card.TAG);
        newCard.className = card.CLASS;
        newCard.innerHTML = card.CONTENT;

        products.appendChild(newCard);
    }
</script>

</body>
</html>
