<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Checkout - PowerPixel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
    <a href="../index.html"><h1>PowerPixel</h1></a>
    <div class="navigation">
        <input type="search" name="find" id="find" placeholder="Busque na PowerPixel!">

        <nav>
            <a href="produtos.html">Produtos</a>
            <a href="carrinho.html">Carrinho</a>
        </nav>
    </div>

    <div class="nav-login">
        <img src="../images/user.png" alt="">
        <a href="login.html">Login</a>
    </div>
</header>

<section>
    <h2>Checkout</h2>

    <input type="text" placeholder="Nome">
    <input type="text" placeholder="Endereço">

    <select>
        <option>Cartão</option>
        <option>PIX</option>
    </select>

    <div class="checkout-products">

        <div class="grid" id="grid">
            <div class="card">
                <img src="../images/teclado.jpg.jpg">
                <h3>Teclado Gamer</h3>
                <p>R$ 199,90</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="../images/mouse.jpg.jpg">
                <h3>Mouse RGB</h3>
                <p>R$ 99,90</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="../images/giftcard.jpg.webp">
                <h3>Gift Card</h3>
                <p>R$ 50,00</p>
                <button>Comprar</button>
            </div>
        </div>

        <h3>Total: R$ 999.999,90</h3>
    </div>

    <button>Confirmar Compra</button>
</section>

</body>
</html>
