<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../images/PowerPixel.png" type="image/x-icon" />
    <title>Login - PowerPixel</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>

    <a href="../index.html" class="back-link">
      ← Voltar para a loja
    </a>

    <section class="login">

      <div class="login-card">

        <!-- Cabeçalho do card com branding -->
        <div class="login-brand">
          <img src="../images/logo.jpg" alt="Logo PowerPixel" />
          <h2>PowerPixel</h2>
        </div>

        <!-- Corpo do card: formulário + foto -->
        <div class="login-body">

          <div class="login-form-side">
            <h1>Meu Perfil</h1>
            <p class="login-subtitle">Entre com seus dados para acessar sua conta</p>

            <form id="formLogin" novalidate>
              <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required />
              </div>

              <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required />
              </div>

              <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required />
              </div>

              <p class="login-aviso" id="loginAviso" aria-live="polite"></p>

              <button type="submit">Entrar</button>
            </form>
          </div>

          <div class="login-divider"></div>

          <div class="login-foto-side">
            <h3>Foto de Perfil</h3>
            <p class="login-subtitle">Adicione uma foto para personalizar sua conta</p>

            <div id="imgSalva">
              <span>Nenhuma imagem selecionada</span>
            </div>

            <label for="fotoPerfil" class="file-label">
              Escolher arquivo
            </label>
            <input type="file" id="fotoPerfil" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" />
            <p class="foto-legenda">Formatos aceitos: .jpg, .jpeg, .png ou .webp.</p>
          </div>

        </div>
      </div>

    </section>

    <script src="../js/login.js"></script>

  </body>
</html>
