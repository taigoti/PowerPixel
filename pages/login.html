<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - PowerPixel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
    <a href="../index.html">
        <img src="../images/logo.jpg" alt="" srcset="">
        <h3>PowerPixel</h3>
    </a>

    <div class="navigation">
        <input type="search" name="find" id="find" placeholder="Busque na PowerPixel!">

        <nav>
            <a href="produtos.html">Produtos</a>
            <a href="carrinho.html">Carrinho</a>
        </nav>
    </div>

    <div class="nav-login">
        <img src="../images/perfil.png" alt="">
        <a href="login.html">Login</a>
    </div>
</header>

<section class="login">
    <h1><strong>Meu Perfil</strong></h1>
<form id="formLogin">
    <input type="text" id="nome" placeholder="Nome">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">

    <button type="submit">Entrar</button>
</form>

    <div class="foto">
        <div id= "imgSalva">
            <!--A imagem deverá aparecer aqui-->
        </div>
        <input type="file" id="fotoPerfil"> <br> <!--"Escolher arquivo"-->
        <button onclick="salvarImg()">Salvar imagem</button>
    </div> 
</section>

<script src="../js/pesquisa.js"></script>

<script src="../js/login.js"></script>
</body>
</html>
