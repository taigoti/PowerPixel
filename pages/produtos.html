<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../images/PowerPixel.png"
      type="image/x-icon"
    />
    <title>Produtos - PowerPixel</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/produtos.css" />
  </head>

  <body>
    <header>
      <a href="../index.html">
        <img src="../images/logo.jpg" alt="Logo PowerPixel" />
        <h3>PowerPixel</h3>
      </a>

      <!-- Botão hamburger (visível só no mobile via CSS) -->
      <button
        class="hamburger"
        id="hamburger"
        aria-label="Abrir menu"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="navigation" id="navigation">
        <input
          type="search"
          name="find"
          id="find"
          placeholder="Busque na PowerPixel!"
        />
        <nav>
          <a href="produtos.html" class="active">Produtos</a>
          <a href="carrinho.html">Meu Carrinho</a>
          <!-- Login aparece aqui no menu mobile -->
          <a href="login.html" class="nav-mobile-login">Fazer Login</a>
        </nav>
      </div>

      <div class="nav-login">
        <img src="../images/perfil.png" alt="Perfil" />
        <a href="login.html">Login</a>
      </div>
    </header>

    <section class="produtos">
      <h2>Todos os Produtos</h2>

      <div class="produtos-filtros">
        <button class="filtro-btn active" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="periferico">Periféricos</button>
        <button class="filtro-btn" data-filtro="hardware">Hardware</button>
        <button class="filtro-btn" data-filtro="audio">Áudio</button>
        <button class="filtro-btn" data-filtro="giftcard">Gift Cards</button>
        <button class="filtro-btn" data-filtro="acessorio">Acessórios</button>
      </div>

      <!-- Cards gerados dinamicamente pelo produtos.js -->
      <div class="grid" id="grid"></div>
    </section>

    <footer>
      <div class="footer-brand">
        <img src="../images/PowerPixel.png" alt="PowerPixel" />
        PowerPixel
      </div>
      <nav class="footer-links">
        <a href="produtos.html">Produtos</a>
        <a href="carrinho.html">Carrinho</a>
        <a href="login.html">Login</a>
      </nav>
      <p class="footer-copy">
        © 2026 PowerPixel — Todos os direitos reservados.
      </p>
    </footer>

    <script src="../js/dados.js"></script>
    <script src="../js/produtos.js"></script>
  </body>
</html>
